<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>EchoLens — environments that explain themselves</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{ --bg:#faf8f3; --fg:#221c14; --surface:#ffffff; --muted:#f1ede4; --muted-fg:#6b6356; --border:#e7e1d4; --accent:#c2553a; --accent-fg:#fff; --warn:#c8472a; --radius:1rem; }
  html,body{background:var(--bg);color:var(--fg);font-family:system-ui,sans-serif}
  .radius{border-radius:var(--radius)}
  .skeleton{background:linear-gradient(90deg,var(--muted) 0%,#f9f9f9 50%,var(--muted) 100%);background-size:200% 100%;animation:shimmer 1.4s linear infinite}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<main class="mx-auto w-full max-w-md px-4 pt-8 pb-16 min-h-screen">
  <header class="mb-6">
    <h1 class="text-4xl font-serif">EchoLens</h1>
    <p id="subtitle" class="text-sm text-gray-500">What if the world could explain itself?</p>
  </header>

  <details id="keyBox" class="mb-4 radius border p-3 text-sm bg-white">
    <summary class="cursor-pointer font-semibold">Gemini API Key <span id="keyState"></span></summary>
    <div class="mt-2 flex gap-2">
      <input id="apiKey" type="password" placeholder="AIza..." class="flex-1 rounded-lg border px-3 py-2" />
      <button id="saveKey" class="rounded-lg bg-black text-white px-3 py-2">Save</button>
    </div>
  </details>

  <div id="modes" class="grid grid-cols-3 gap-1 p-1 border rounded-xl bg-white mb-5"></div>

  <div id="frame" class="relative aspect-[4/5] overflow-hidden rounded-3xl border bg-gray-100">
    <video id="video" playsinline muted class="hidden absolute inset-0 w-full h-full object-cover"></video>
    <img id="preview" class="hidden absolute inset-0 w-full h-full object-cover" />
    <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center text-white font-bold">Interpreting…</div>
  </div>

  <div id="actions" class="mt-4 grid grid-cols-2 gap-2">
    <button id="openCam" class="rounded-xl bg-black text-white py-3">Open Camera</button>
    <button id="uploadBtn" class="rounded-xl border py-3">Upload Image</button>
    <input id="fileInput" type="file" accept="image/*" class="hidden" />
  </div>
  <button id="snap" class="hidden mt-4 w-full rounded-xl bg-red-600 text-white py-3">Capture Frame</button>
  <button id="reset" class="hidden mt-4 w-full rounded-xl border py-3">New Scene</button>

  <div id="results" class="mt-6 space-y-4"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const KEY_STORAGE = "echolens_gemini_key";
let mode = "standard";

// --- API Logic ---
async function interpret(base64Image, mimeType) {
  const apiKey = localStorage.getItem(KEY_STORAGE);
  if (!apiKey) { alert("Please save your API key first!"); return; }
  
  $("loadingOverlay").classList.remove("hidden");
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: `Analyze this image as EchoLens. Mode: ${mode}. Return JSON: { "environment_type": "", "situational_summary": "", "primary_landmark": "", "accessibility_notes": "", "safety_warning": "" }` },
          { inline_data: { mime_type: mimeType, data: base64Image } }
        ]}]
      })
    });
    const data = await response.json();
    const text = data.candidates[0].content.parts[0].text;
    const json = JSON.parse(text.replace(/```json|```/g, ""));
    renderResults(json);
  } catch (e) { alert("Error: " + e.message); } 
  finally { $("loadingOverlay").classList.add("hidden"); }
}

function renderResults(d) {
  $("results").innerHTML = `
    <div class="p-4 rounded-2xl bg-white border shadow-sm">
      <h2 class="font-bold text-lg">${d.environment_type}</h2>
      <p class="text-sm mt-2">${d.situational_summary}</p>
      <p class="text-xs mt-3 text-gray-500"><strong>Landmark:</strong> ${d.primary_landmark}</p>
      ${d.safety_warning ? `<div class="mt-3 p-2 bg-red-50 text-red-700 text-xs rounded">⚠️ ${d.safety_warning}</div>` : ""}
    </div>`;
}

// --- UI Helpers ---
$("saveKey").onclick = () => {
  localStorage.setItem(KEY_STORAGE, $("apiKey").value.trim());
  $("keyState").textContent = " (Saved)";
  $("keyBox").open = false;
};

$("openCam").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  $("video").srcObject = stream;
  $("video").classList.remove("hidden");
  $("openCam").classList.add("hidden");
  $("snap").classList.remove("hidden");
};

$("snap").onclick = () => {
  const c = document.createElement("canvas");
  c.width = $("video").videoWidth; c.height = $("video").videoHeight;
  c.getContext("2d").drawImage($("video"), 0, 0);
  const data = c.toDataURL("image/jpeg").split(",")[1];
  $("preview").src = c.toDataURL("image/jpeg");
  $("preview").classList.remove("hidden");
  $("video").classList.add("hidden");
  $("snap").classList.add("hidden");
  $("reset").classList.remove("hidden");
  interpret(data, "image/jpeg");
};

$("uploadBtn").onclick = () => $("fileInput").click();
$("fileInput").onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const data = ev.target.result.split(",")[1];
    $("preview").src = ev.target.result;
    $("preview").classList.remove("hidden");
    $("reset").classList.remove("hidden");
    $("actions").classList.add("hidden");
    interpret(data, "image/jpeg");
  };
  reader.readAsDataURL(e.target.files[0]);
};

$("reset").onclick = () => location.reload();
</script>
</body>
</html>
